<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Expense</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div th:replace="fragments/header :: header"></div>

<div class="container">
    <h2>Add Expense</h2>

    <form th:action="@{/expenses/add}" method="post" th:object="${expense}">

        <div class="form-group">
            <label>Title</label>
            <input type="text" th:field="*{title}" placeholder="Enter expense title" required>
        </div>

        <div class="form-group">
            <label>Category</label>
            <select th:field="*{category}">
                <option value="Food">Food</option>
                <option value="Travel">Travel</option>
                <option value="Rent">Rent</option>
                <option value="Utilities">Utilities</option>
                <option value="Others">Others</option>

                <option th:each="cat : ${categories}"
                        th:value="${cat.name}"
                        th:text="${cat.name}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Amount</label>
            <input type="number" step="1" th:field="*{amount}" placeholder="Enter amount" required>
        </div>

        <div class="form-group">
            <label>Date</label>
            <input type="date" th:field="*{date}">
        </div>

        <button type="submit">Save Expense</button>

    </form>
</div>

</body>
</html>
